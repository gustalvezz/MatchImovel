name: Send Visit Reminders

on:
  schedule:
    - cron: '*/30 * * * *'  # a cada 30 minutos
  workflow_dispatch:          # permite rodar manualmente pelo GitHub

jobs:
  remind:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger visit reminders
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST "${{ secrets.BACKEND_URL }}/api/internal/send-visit-reminders" \
            -H "X-Internal-Key: ${{ secrets.INTERNAL_API_KEY }}" \
            -H "Content-Type: application/json")

          echo "HTTP status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" != "200" ]; then
            echo "Error: unexpected status $response"
            exit 1
          fi
